<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Trip Organizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 10px; }
        .trip-selector { margin: 20px 0; }
        .tabs { display: flex; gap: 20px; margin: 30px 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #666; padding: 10px; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #4a90e2; border-bottom-color: #4a90e2; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { background: #4a90e2; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background: #357abd; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .stat-card { background: #f9f9f9; padding: 20px; border-radius: 4px; text-align: center; }
        .stat-card h3 { font-size: 32px; color: #4a90e2; margin-bottom: 5px; }
        .stat-card p { color: #666; font-size: 14px; }
        .checklist { margin: 20px 0; }
        .item { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 4px; display: flex; gap: 10px; align-items: center; }
        .item input { width: auto; }
        .item.completed { opacity: 0.6; }
        #logisticsBanner { background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 15px; margin-bottom: 20px; display: none; }
        .modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.open { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 400px; }
        .modal-content h2 { margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div id="logisticsBanner">
            <strong>📋 Logistics:</strong> <span id="logisticsText"></span>
        </div>

        <h1>🏕️ Group Trip Organizer</h1>
        <p>Live shared coordination for group trips.</p>
        
        <div class="trip-selector">
            <label>Trip ID:</label>
            <select id="tripSelect" onchange="switchTripFromSelect()" style="width: 200px;">
                <option value="moose-25">moose-25</option>
            </select>
            <button onclick="createNewTrip()" style="background: #27ae60; margin-left: 10px;">+ New Trip</button>
            <button onclick="deleteCurrentTrip()" style="background: #e74c3c;">Delete Trip</button>
            <span id="syncStatus">Syncing...</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('items', this)">📋 Items</button>
            <button class="tab-btn" onclick="switchTab('meals', this)">🍽️ Meals</button>
            <button class="tab-btn" onclick="switchTab('admin', this)">⚙️ Admin</button>
        </div>

        <!-- ITEMS TAB -->
        <div id="items" class="tab-content active">
            <h2>Add Item</h2>
            <div class="form-group">
                <label>Family:</label>
                <select id="person"><option>Select family...</option></select>
            </div>
            <div class="form-group">
                <label>Item:</label>
                <input type="text" id="item" placeholder="What are you bringing?">
            </div>
            <div class="form-group">
                <label>Category:</label>
                <select id="category">
                    <option>Shared Items</option>
                    <option>Food & Drinks</option>
                    <option>Entertainment</option>
                    <option>Activities</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notes (optional):</label>
                <textarea id="notes" rows="3"></textarea>
            </div>
            <button onclick="addItem()">Add to List</button>

            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalItems">0</h3>
                    <p>Items</p>
                </div>
                <div class="stat-card">
                    <h3 id="uniquePeople">0</h3>
                    <p>People</p>
                </div>
                <div class="stat-card">
                    <h3 id="completedItems">0</h3>
                    <p>Checked</p>
                </div>
            </div>

            <h2>Who's got what?</h2>
            <div id="checklist" class="checklist"></div>
        </div>

        <!-- MEALS TAB -->
        <div id="meals" class="tab-content">
            <h2>Meal Calendar</h2>
            <div class="form-group">
                <label>Start Date:</label>
                <input type="date" id="mealStartDate">
            </div>
            <div class="form-group">
                <label>Number of Days:</label>
                <input type="number" id="mealDays" value="7" min="1" max="30">
            </div>
            <button onclick="generateMealCalendar()">Generate Calendar</button>
            <div id="mealCalendar"></div>

            <h2 style="margin-top: 40px;">Other Stuff by Family</h2>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;" id="otherStuffColumns"></div>
            <div style="margin-top: 20px;">
                <label>Add to Family:</label>
                <select id="otherStuffFamily" style="width: 200px;">
                    <option value="">Select family...</option>
                </select>
                <input type="text" id="otherStuffItem" placeholder="Item to add" style="width: 300px; margin-left: 10px;">
                <button onclick="addOtherStuff()" style="margin-left: 10px;">Add</button>
            </div>
        </div>

        <!-- ADMIN TAB -->
        <div id="admin" class="tab-content">
            <h2>Manage Families</h2>
            <div class="form-group">
                <label>Family Name:</label>
                <input type="text" id="familyName" placeholder="e.g., Castellot">
            </div>
            <div class="form-group">
                <label>Color:</label>
                <div style="display: flex; gap: 10px; align-items: center;">
                    <input type="color" id="familyColor" value="#4a90e2" style="width: 60px; height: 40px; cursor: pointer; border: 2px solid #ddd; border-radius: 4px;">
                    <span id="colorHex" style="font-family: monospace; font-size: 14px;">#4a90e2</span>
                </div>
            </div>
            <button onclick="addFamily()">Add Family</button>
            <div id="familiesList" style="margin-top: 20px;"></div>

            <h2 style="margin-top: 40px;">Trip Logistics</h2>
            <div class="form-group">
                <label>Logistics Notes:</label>
                <textarea id="logisticsInput" rows="4" placeholder="e.g., Meet at parking lot at 9am, bring cash for tolls..."></textarea>
            </div>
            <button onclick="saveLogistics()">Save Logistics</button>

            <h2 style="margin-top: 40px;">Clone Past Trip</h2>
            <div class="form-group">
                <label>Select Trip to Clone:</label>
                <div style="display: flex; gap: 10px;">
                    <select id="tripToClone" style="flex: 1;">
                        <option value="">Choose a past trip...</option>
                    </select>
                    <button onclick="loadTripsForCloning()" style="padding: 10px 15px;">↻ Refresh</button>
                </div>
            </div>
            <div class="form-group">
                <label>New Trip ID:</label>
                <input type="text" id="newTripId" placeholder="e.g., moose-26">
            </div>
            <button onclick="cloneTrip()">Clone Trip</button>
        </div>
    </div>

    <!-- MEAL MODAL -->
    <div id="mealModal" class="modal">
        <div class="modal-content">
            <h2>Add Meal</h2>
            
            <div class="form-group">
                <label>Date:</label>
                <input type="text" id="mealDate" readonly style="background: #f0f0f0;">
            </div>
            
            <div class="form-group">
                <label>Meal Type:</label>
                <div style="display: flex; gap: 10px;">
                    <button id="breakfastBtn" onclick="selectMealTime('Breakfast')" style="flex: 1; padding: 10px; background: #ccc; border: none; border-radius: 4px; cursor: pointer; color: #333;">Breakfast</button>
                    <button id="lunchBtn" onclick="selectMealTime('Lunch')" style="flex: 1; padding: 10px; background: #ccc; border: none; border-radius: 4px; cursor: pointer; color: #333;">Lunch</button>
                    <button id="dinnerBtn" onclick="selectMealTime('Dinner')" style="flex: 1; padding: 10px; background: #ccc; border: none; border-radius: 4px; cursor: pointer; color: #333;">Dinner</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>Category:</label>
                <div style="display: flex; gap: 10px;">
                    <button id="mainBtn" onclick="selectMealCategory('Main')" style="flex: 1; padding: 10px; background: #4a90e2; color: white; border: none; border-radius: 4px; cursor: pointer;">Main Meal</button>
                    <button id="kidsBtn" onclick="selectMealCategory('Kids')" style="flex: 1; padding: 10px; background: #ccc; border: none; border-radius: 4px; cursor: pointer; color: #333;">Kids Meal</button>
                </div>
            </div>
            
            <div class="form-group">
                <label>Family:</label>
                <select id="mealFamilySelect" style="width: 100%;">
                    <option value="">Select family...</option>
                </select>
            </div>
            
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button onclick="saveMealFromModal()" style="flex: 1; background: #27ae60; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer;">Save Meal</button>
                <button onclick="closeMealModal()" style="flex: 1; background: #e74c3c; color: white; padding: 10px; border: none; border-radius: 4px; cursor: pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let currentTripId = 'moose-25';
        let families = [];
        let currentMeals = [];
        
        let mealFormData = {
            date: null,
            time: null,
            category: 'Main',
            familyId: null
        };

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('familyColor').addEventListener('change', (e) => {
                document.getElementById('colorHex').textContent = e.target.value.toUpperCase();
            });
            
            loadFamilies();
            loadLogistics();
            loadItems();
            loadAllTrips();
            loadTripsForCloning();
            document.getElementById('mealStartDate').valueAsDate = new Date();
            setInterval(() => { loadItems(); }, 3000);
        });

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            if (btn) btn.classList.add('active');
            
            if (tab === 'admin') {
                loadAllTrips();
                loadTripsForCloning();
            }
            if (tab === 'meals') {
                loadOtherStuff();
            }
        }

        function switchTripFromSelect() {
            currentTripId = document.getElementById('tripSelect').value;
            loadItems();
            loadLogistics();
        }

        function switchTrip() {
            const id = document.getElementById('tripId').value.trim();
            if (id) {
                currentTripId = id;
                loadItems();
                loadLogistics();
            }
        }

        async function loadAllTrips() {
            try {
                const res = await fetch(`${API}/api/trips`);
                const trips = await res.json();
                const select = document.getElementById('tripSelect');
                select.innerHTML = '';
                trips.forEach(trip => {
                    const opt = document.createElement('option');
                    opt.value = trip;
                    opt.textContent = trip;
                    select.appendChild(opt);
                });
                if (trips.length === 0) {
                    const opt = document.createElement('option');
                    opt.value = 'moose-25';
                    opt.textContent = 'moose-25';
                    select.appendChild(opt);
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function loadFamilies() {
            try {
                const res = await fetch(`${API}/api/families`);
                families = await res.json();
                const select = document.getElementById('person');
                const current = select.value;
                select.innerHTML = '<option>Select family...</option>';
                
                const otherSelect = document.getElementById('otherStuffFamily');
                otherSelect.innerHTML = '<option value="">Select family...</option>';
                
                families.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f.name;
                    opt.textContent = f.name;
                    select.appendChild(opt);
                    
                    const opt2 = document.createElement('option');
                    opt2.value = f.id;
                    opt2.textContent = f.name;
                    otherSelect.appendChild(opt2);
                });
                if (current && current !== 'Select family...') select.value = current;
                updateFamiliesList();
            } catch (e) { console.error(e); }
        }

        function updateFamiliesList() {
            const list = document.getElementById('familiesList');
            list.innerHTML = '<h3>Current Families:</h3>';
            families.forEach(f => {
                const div = document.createElement('div');
                div.style.display = 'inline-flex';
                div.style.alignItems = 'center';
                div.style.background = f.color;
                div.style.color = 'white';
                div.style.padding = '8px 12px';
                div.style.borderRadius = '20px';
                div.style.margin = '5px';
                div.style.gap = '8px';
                
                const nameSpan = document.createElement('span');
                nameSpan.textContent = f.name;
                div.appendChild(nameSpan);
                
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '✕';
                deleteBtn.style.background = 'rgba(255,255,255,0.3)';
                deleteBtn.style.color = 'white';
                deleteBtn.style.border = 'none';
                deleteBtn.style.padding = '2px 6px';
                deleteBtn.style.borderRadius = '50%';
                deleteBtn.style.cursor = 'pointer';
                deleteBtn.style.fontSize = '16px';
                deleteBtn.onclick = () => deleteFamily(f.id);
                div.appendChild(deleteBtn);
                
                list.appendChild(div);
            });
        }

        async function addFamily() {
            const name = document.getElementById('familyName').value.trim();
            const color = document.getElementById('familyColor').value;
            if (!name) return;
            try {
                await fetch(`${API}/api/families`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, color })
                });
                loadFamilies();
                document.getElementById('familyName').value = '';
            } catch (e) { alert('Error adding family'); }
        }

        async function deleteFamily(id) {
            if (!confirm('Delete this family?')) return;
            try {
                await fetch(`${API}/api/families/${id}`, { method: 'DELETE' });
                loadFamilies();
            } catch (e) {
                alert('Error deleting family');
            }
        }

        async function loadItems() {
            try {
                const res = await fetch(`${API}/api/trips/${currentTripId}/items`);
                const items = await res.json();
                renderChecklist(items);
                updateStats(items);
                document.getElementById('syncStatus').textContent = 'Synced ✓';
            } catch (e) {
                console.error(e);
                document.getElementById('syncStatus').textContent = 'Sync error';
            }
        }

        async function addItem() {
            const person = document.getElementById('person').value;
            const item = document.getElementById('item').value.trim();
            const category = document.getElementById('category').value;
            const notes = document.getElementById('notes').value.trim();

            if (!person || !item) return alert('Fill in person and item');

            try {
                await fetch(`${API}/api/trips/${currentTripId}/items`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: Date.now(), person, item, category, notes })
                });
                document.getElementById('item').value = '';
                document.getElementById('notes').value = '';
                loadItems();
            } catch (e) { alert('Error adding item'); }
        }

        function renderChecklist(items) {
            const container = document.getElementById('checklist');
            if (items.length === 0) {
                container.innerHTML = '<p>No items yet. Add something above!</p>';
                return;
            }
            
            const grouped = {};
            items.forEach(item => {
                if (!grouped[item.category]) {
                    grouped[item.category] = [];
                }
                grouped[item.category].push(item);
            });
            
            let html = '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">';
            Object.entries(grouped).forEach(([category, categoryItems]) => {
                html += `<div>
                    <h3 style="background: #f0f0f0; padding: 10px; border-radius: 4px; margin-bottom: 10px;">${category}</h3>
                    <div>`;
                
                categoryItems.forEach(item => {
                    html += `<div style="background: #f9f9f9; padding: 10px; margin-bottom: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>${item.item}</strong> — <em>${item.person}</em>
                            ${item.notes ? `<br><small style="color: #999;">📌 ${item.notes}</small>` : ''}
                        </div>
                        <button style="background: #e74c3c; padding: 5px 10px; font-size: 12px;" onclick="deleteItem(${item.id})">Delete</button>
                    </div>`;
                });
                
                html += '</div></div>';
            });
            html += '</div>';
            
            container.innerHTML = html;
        }

        async function deleteItem(id) {
            if (!confirm('Delete?')) return;
            try {
                await fetch(`${API}/api/trips/${currentTripId}/items/${id}`, { method: 'DELETE' });
                loadItems();
            } catch (e) { alert('Error'); }
        }

        function updateStats(items) {
            window.currentItems = items;
            document.getElementById('totalItems').textContent = items.length;
            document.getElementById('uniquePeople').textContent = new Set(items.map(i => i.person)).size;
            document.getElementById('completedItems').textContent = items.filter(i => i.completed).length;
        }

        function loadLogistics() {
            const text = localStorage.getItem(`logistics-${currentTripId}`);
            if (text) {
                document.getElementById('logisticsText').textContent = text;
                document.getElementById('logisticsBanner').style.display = 'block';
                document.getElementById('logisticsInput').value = text;
            } else {
                document.getElementById('logisticsBanner').style.display = 'none';
            }
        }

        function saveLogistics() {
            const text = document.getElementById('logisticsInput').value.trim();
            if (!text) return alert('Enter logistics notes');
            localStorage.setItem(`logistics-${currentTripId}`, text);
            loadLogistics();
            alert('Logistics saved!');
        }

        async function generateMealCalendar() {
            const startDate = new Date(document.getElementById('mealStartDate').value);
            const days = parseInt(document.getElementById('mealDays').value) || 7;
            
            let html = '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px;">';
            
            ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
                html += `<div style="text-align: center; font-weight: bold; padding: 10px; background: #f0f0f0; border-radius: 4px;">${day}</div>`;
            });
            
            const startDay = startDate.getDay();
            for (let i = 0; i < startDay; i++) html += '<div></div>';
            
            for (let i = 0; i < days; i++) {
                const date = new Date(startDate);
                date.setDate(date.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                const dayMeals = currentMeals.filter(m => m.meal_date === dateStr) || [];
                
                html += `
                    <div style="border: 1px solid #ddd; border-radius: 4px; padding: 10px; min-height: 150px; cursor: pointer;" onclick="openMealForm('${dateStr}')">
                        <div style="font-weight: bold; margin-bottom: 10px;">${date.getDate()}</div>
                        ${dayMeals.map(m => `
                            <div style="background: ${m.color || '#4a90e2'}; color: white; padding: 6px; border-radius: 3px; margin-bottom: 5px; font-size: 12px;">
                                <strong>${m.meal_time}</strong><br>${m.family_name || 'Unassigned'}
                            </div>
                        `).join('')}
                        <button style="font-size: 12px; padding: 4px 8px; margin-top: 5px;">+ Add Meal</button>
                    </div>
                `;
            }
            
            html += '</div>';
            document.getElementById('mealCalendar').innerHTML = html;
            await fetchMeals();
        }

        async function fetchMeals() {
            try {
                const res = await fetch(`${API}/api/trips/${currentTripId}/meals`);
                currentMeals = await res.json();
                return currentMeals;
            } catch (e) {
                console.error(e);
                return [];
            }
        }

        function openMealForm(dateStr) {
            mealFormData = {
                date: dateStr,
                time: null,
                category: 'Main',
                familyId: null
            };
            
            document.getElementById('mealDate').value = dateStr;
            document.getElementById('mainBtn').style.background = '#4a90e2';
            document.getElementById('mainBtn').style.color = 'white';
            document.getElementById('kidsBtn').style.background = '#ccc';
            document.getElementById('kidsBtn').style.color = '#333';
            document.getElementById('breakfastBtn').style.background = '#ccc';
            document.getElementById('breakfastBtn').style.color = '#333';
            document.getElementById('lunchBtn').style.background = '#ccc';
            document.getElementById('lunchBtn').style.color = '#333';
            document.getElementById('dinnerBtn').style.background = '#ccc';
            document.getElementById('dinnerBtn').style.color = '#333';
            
            document.getElementById('mealFamilySelect').innerHTML = '<option value="">Select family...</option>';
            families.forEach(f => {
                const opt = document.createElement('option');
                opt.value = f.id;
                opt.textContent = f.name;
                document.getElementById('mealFamilySelect').appendChild(opt);
            });
            
            document.getElementById('mealModal').classList.add('open');
        }

        function closeMealModal() {
            document.getElementById('mealModal').classList.remove('open');
        }

        function selectMealTime(time) {
            mealFormData.time = time;
            document.getElementById('breakfastBtn').style.background = time === 'Breakfast' ? '#4a90e2' : '#ccc';
            document.getElementById('breakfastBtn').style.color = time === 'Breakfast' ? 'white' : '#333';
            document.getElementById('lunchBtn').style.background = time === 'Lunch' ? '#4a90e2' : '#ccc';
            document.getElementById('lunchBtn').style.color = time === 'Lunch' ? 'white' : '#333';
            document.getElementById('dinnerBtn').style.background = time === 'Dinner' ? '#4a90e2' : '#ccc';
            document.getElementById('dinnerBtn').style.color = time === 'Dinner' ? 'white' : '#333';
        }

        function selectMealCategory(category) {
            mealFormData.category = category;
            document.getElementById('mainBtn').style.background = category === 'Main' ? '#4a90e2' : '#ccc';
            document.getElementById('mainBtn').style.color = category === 'Main' ? 'white' : '#333';
            document.getElementById('kidsBtn').style.background = category === 'Kids' ? '#4a90e2' : '#ccc';
            document.getElementById('kidsBtn').style.color = category === 'Kids' ? 'white' : '#333';
        }

        async function saveMealFromModal() {
            mealFormData.familyId = document.getElementById('mealFamilySelect').value;
            
            if (!mealFormData.time || !mealFormData.familyId) {
                return alert('Select meal type and family');
            }
            
            try {
                await fetch(`${API}/api/trips/${currentTripId}/meals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        meal_date: mealFormData.date,
                        meal_time: `${mealFormData.time} (${mealFormData.category})`,
                        meal_name: null,
                        family_id: mealFormData.familyId,
                        description: null
                    })
                });
                closeMealModal();
                generateMealCalendar();
            } catch (e) {
                alert('Error saving meal');
            }
        }

        async function loadTripsForCloning() {
            try {
                const res = await fetch(`${API}/api/trips`);
                const trips = await res.json();
                const select = document.getElementById('tripToClone');
                select.innerHTML = '<option value="">Choose a past trip...</option>';
                trips.forEach(trip => {
                    const opt = document.createElement('option');
                    opt.value = trip;
                    opt.textContent = trip;
                    select.appendChild(opt);
                });
            } catch (e) {
                console.error(e);
            }
        }

        async function createNewTrip() {
            const newId = prompt('Enter new trip ID (e.g., moose-26):');
            if (!newId) return;
            
            try {
                await fetch(`${API}/api/trips`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tripId: newId.trim() })
                });
                
                currentTripId = newId.trim();
                await loadAllTrips();
                document.getElementById('tripSelect').value = currentTripId;
                loadItems();
                alert(`✅ Created trip: ${currentTripId}`);
            } catch (e) {
                alert('Error creating trip');
            }
        }

        async function deleteCurrentTrip() {
            if (!confirm(`Delete trip "${currentTripId}"? This cannot be undone.`)) return;
            
            try {
                await fetch(`${API}/api/trips/${currentTripId}`, { method: 'DELETE' });
                alert(`Deleted ${currentTripId}`);
                currentTripId = 'moose-25';
                await loadAllTrips();
                document.getElementById('tripSelect').value = currentTripId;
                loadItems();
            } catch (e) {
                alert('Error deleting trip');
            }
        }

        async function cloneTrip() {
            const sourceTrip = document.getElementById('tripToClone').value;
            const newTrip = document.getElementById('newTripId').value.trim();
            
            if (!sourceTrip || !newTrip) return alert('Select a trip and enter new trip ID');
            
            try {
                const res = await fetch(`${API}/api/trips/${sourceTrip}/items`);
                const items = await res.json();
                
                for (const item of items) {
                    await fetch(`${API}/api/trips/${newTrip}/items`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            id: Date.now() + Math.random(),
                            person: item.person,
                            item: item.item,
                            category: item.category,
                            notes: item.notes
                        })
                    });
                }
                
                alert(`Cloned ${items.length} items to ${newTrip}!`);
                document.getElementById('newTripId').value = '';
                document.getElementById('tripToClone').value = '';
            } catch (e) {
                alert('Error cloning trip');
            }
        }

        async function loadOtherStuff() {
            try {
                const res = await fetch(`${API}/api/trips/${currentTripId}/other-stuff`);
                const items = await res.json();
                renderOtherStuffColumns(items);
            } catch (e) {
                console.error(e);
            }
        }

        function renderOtherStuffColumns(items) {
            const container = document.getElementById('otherStuffColumns');
            
            const byFamily = {};
            families.forEach(f => {
                byFamily[f.id] = { name: f.name, color: f.color, items: [] };
            });
            
            items.forEach(item => {
                if (byFamily[item.family_id]) {
                    byFamily[item.family_id].items.push(item);
                }
            });
            
            let html = '';
            Object.entries(byFamily).forEach(([familyId, data]) => {
                html += `
                    <div style="background: #f9f9f9; border-left: 4px solid ${data.color}; padding: 15px; border-radius: 4px;">
                        <h3 style="color: ${data.color}; margin-bottom: 10px;">${data.name}</h3>
                        <ul style="margin: 0; padding-left: 20px;">
                `;
                
                data.items.forEach(item => {
                    html += `
                        <li style="margin-bottom: 8px;">
                            ${item.item}
                            <button onclick="deleteOtherStuff(${item.id})" style="background: #e74c3c; padding: 2px 6px; font-size: 12px; margin-left: 5px; color: white; border: none; border-radius: 3px; cursor: pointer;">✕</button>
                        </li>
                    `;
                });
                
                html += `
                        </ul>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        async function addOtherStuff() {
            const familyId = document.getElementById('otherStuffFamily').value;
            const item = document.getElementById('otherStuffItem').value.trim();
            
            if (!familyId || !item) return alert('Select family and enter item');
            
            try {
                await fetch(`${API}/api/trips/${currentTripId}/other-stuff`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ familyId, item })
                });
                
                document.getElementById('otherStuffItem').value = '';
                loadOtherStuff();
            } catch (e) {
                alert('Error adding item');
            }
        }

        async function deleteOtherStuff(id) {
            if (!confirm('Delete?')) return;
            try {
                await fetch(`${API}/api/trips/${currentTripId}/other-stuff/${id}`, { method: 'DELETE' });
                loadOtherStuff();
            } catch (e) {
                alert('Error deleting');
            }
        }
    </script>
</body>
</html>
