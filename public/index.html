<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Group Trip Organizer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 8px; padding: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 10px; }
        .trip-selector { margin: 20px 0; }
        .tabs { display: flex; gap: 20px; margin: 30px 0; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; cursor: pointer; font-size: 16px; color: #666; padding: 10px; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: #4a90e2; border-bottom-color: #4a90e2; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .form-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { background: #4a90e2; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        button:hover { background: #357abd; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .stat-card { background: #f9f9f9; padding: 20px; border-radius: 4px; text-align: center; }
        .stat-card h3 { font-size: 32px; color: #4a90e2; margin-bottom: 5px; }
        .stat-card p { color: #666; font-size: 14px; }
        .checklist { margin: 20px 0; }
        .item { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 4px; display: flex; gap: 10px; align-items: center; }
        .item input { width: auto; }
        .item.completed { opacity: 0.6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏕️ Moose Lake </h1>
        <p>When I say moose.......</p>
        <div id="logisticsBanner" style="background: #fff3cd; border: 1px solid #ffc107; border-radius: 4px; padding: 15px; margin-bottom: 20px; display: none;">
    <strong>📋 Logistics:</strong> <span id="logisticsText"></span>
</div>
        
        <div class="trip-selector">
            <label>Trip ID:</label>
            <input type="text" id="tripId" value="moose-25" style="width: 200px;">
            <button onclick="switchTrip()">Switch Trip</button>
            <span id="syncStatus">Syncing...</span>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('items', this)">📋 Items</button>
            <button class="tab-btn" onclick="switchTab('meals', this)">🍽️ Meals</button>
            <button class="tab-btn" onclick="switchTab('admin', this)">⚙️ Admin</button>
        </div>

        <div id="items" class="tab-content active">
            <h2>Add Item</h2>
            <div class="form-group">
                <label>Family:</label>
                <select id="person"><option>Select family...</option></select>
            </div>
            <div class="form-group">
                <label>Item:</label>
                <input type="text" id="item" placeholder="What are you bringing?">
            </div>
            <div class="form-group">
                <label>Category:</label>
                <select id="category">
                    <option>Shared Items</option>
                    <option>Food & Drinks</option>
                    <option>Entertainment</option>
                    <option>Activities</option>
                    <option>Logistics</option>
                    <option>Other</option>
                </select>
            </div>
            <div class="form-group">
                <label>Notes (optional):</label>
                <textarea id="notes" rows="3"></textarea>
            </div>
            <button onclick="addItem()">Add to List</button>

            <div class="stats">
                <div class="stat-card">
                    <h3 id="totalItems">0</h3>
                    <p>Items</p>
                </div>
                <div class="stat-card">
                    <h3 id="uniquePeople">0</h3>
                    <p>People</p>
                </div>
                <div class="stat-card">
                    <h3 id="completedItems">0</h3>
                    <p>Checked</p>
                </div>
            </div>

            <h2>Checklist</h2>
            <div id="checklist" class="checklist"></div>
        </div>

<div id="meals" class="tab-content">
    <h2>Meal Calendar</h2>
    <div class="form-group">
        <label>Start Date:</label>
        <input type="date" id="mealStartDate">
    </div>
    <div class="form-group">
        <label>Number of Days:</label>
        <input type="number" id="mealDays" value="7" min="1" max="30">
    </div>
    <button onclick="generateMealCalendar()">Generate Calendar</button>
    <div id="mealCalendar"></div>
</div>

        <div id="admin" class="tab-content">
            <h2>Manage Families</h2>
            <div class="form-group">
                <label>Family Name:</label>
                <input type="text" id="familyName" placeholder="e.g., Castellot">
            </div>
            <div class="form-group">
                <label>Color:</label>
                <input type="color" id="familyColor" value="#4a90e2">
            </div>
            <button onclick="addFamily()">Add Family</button>
            <div id="familiesList" style="margin-top: 20px;"></div>
            <h2 style="margin-top: 40px;">Trip Logistics</h2>
<div class="form-group">
    <label>Logistics Notes:</label>
    <textarea id="logisticsInput" rows="4" placeholder="e.g., Meet at parking lot at 9am, bring cash for tolls..."></textarea>
</div>
<button onclick="saveLogistics()">Save Logistics</button>
        </div>
    </div>

    <script>
        const API = window.location.origin;
        let currentTripId = 'moose-25';
        let families = [];
        let currentMeals = [];

        document.addEventListener('DOMContentLoaded', () => {
            loadFamilies();
            loadLogistics();
            loadItems();
            document.getElementById('mealStartDate').valueAsDate = new Date();
            setInterval(() => { loadItems(); }, 3000);
        });

        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            if (btn) btn.classList.add('active');
        }

        function switchTrip() {
            const id = document.getElementById('tripId').value.trim();
            if (id) {
                currentTripId = id;
                loadItems();
                loadLogistics();
            }
        }

        async function loadFamilies() {
            try {
                const res = await fetch(`${API}/api/families`);
                families = await res.json();
                const select = document.getElementById('person');
                const current = select.value;
                select.innerHTML = '<option>Select family...</option>';
                families.forEach(f => {
                    const opt = document.createElement('option');
                    opt.value = f.name;
                    opt.textContent = f.name;
                    select.appendChild(opt);
                });
                if (current && current !== 'Select family...') select.value = current;
                updateFamiliesList();
            } catch (e) { console.error(e); }
        }

        function updateFamiliesList() {
            const list = document.getElementById('familiesList');
            list.innerHTML = '<h3>Current Families:</h3>';
            families.forEach(f => {
                const div = document.createElement('div');
                div.style.display = 'inline-block';
                div.style.background = f.color;
                div.style.color = 'white';
                div.style.padding = '8px 16px';
                div.style.borderRadius = '20px';
                div.style.margin = '5px';
                div.textContent = f.name;
                list.appendChild(div);
            });
        }

        async function addFamily() {
            const name = document.getElementById('familyName').value.trim();
            const color = document.getElementById('familyColor').value;
            if (!name) return;
            try {
                await fetch(`${API}/api/families`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, color })
                });
                loadFamilies();
                document.getElementById('familyName').value = '';
            } catch (e) { alert('Error adding family'); }
        }

        async function loadItems() {
            try {
                const res = await fetch(`${API}/api/trips/${currentTripId}/items`);
                const items = await res.json();
                renderChecklist(items);
                updateStats(items);
                document.getElementById('syncStatus').textContent = 'Synced ✓';
            } catch (e) {
                console.error(e);
                document.getElementById('syncStatus').textContent = 'Sync error';
            }
        }

        async function addItem() {
            const person = document.getElementById('person').value;
            const item = document.getElementById('item').value.trim();
            const category = document.getElementById('category').value;
            const notes = document.getElementById('notes').value.trim();

            if (!person || !item) return alert('Fill in person and item');

            try {
                await fetch(`${API}/api/trips/${currentTripId}/items`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: Date.now(), person, item, category, notes })
                });
                document.getElementById('item').value = '';
                document.getElementById('notes').value = '';
                loadItems();
            } catch (e) { alert('Error adding item'); }
        }

        function renderChecklist(items) {
            const container = document.getElementById('checklist');
            if (items.length === 0) {
                container.innerHTML = '<p>No items yet. Add something above!</p>';
                return;
            }
            container.innerHTML = items.map(item => `
                <div class="item ${item.completed ? 'completed' : ''}">
                    <input type="checkbox" ${item.completed ? 'checked' : ''} onchange="toggleItem(${item.id})">
                    <div style="flex: 1;">
                        <strong>${item.item}</strong> (${item.person})
                        <br><small>${item.category}</small>
                    </div>
                    <button style="background: #e74c3c; padding: 5px 10px; font-size: 12px;" onclick="deleteItem(${item.id})">Delete</button>
                </div>
            `).join('');
        }

        async function toggleItem(id) {
            const items = window.currentItems || [];
            const item = items.find(i => i.id == id);
            if (!item) return;
            try {
                await fetch(`${API}/api/trips/${currentTripId}/items/${id}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ completed: !item.completed })
                });
                loadItems();
            } catch (e) { alert('Error'); }
        }

        async function deleteItem(id) {
            if (!confirm('Delete?')) return;
            try {
                await fetch(`${API}/api/trips/${currentTripId}/items/${id}`, { method: 'DELETE' });
                loadItems();
            } catch (e) { alert('Error'); }
        }

        function updateStats(items) {
            window.currentItems = items;
            document.getElementById('totalItems').textContent = items.length;
            document.getElementById('uniquePeople').textContent = new Set(items.map(i => i.person)).size;
            document.getElementById('completedItems').textContent = items.filter(i => i.completed).length;
        }

        async function generateMealCalendar() {
            const startDate = new Date(document.getElementById('mealStartDate').value);
            const days = parseInt(document.getElementById('mealDays').value) || 7;
            
            let html = '<div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px;">';
            
            ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(day => {
                html += `<div style="text-align: center; font-weight: bold; padding: 10px; background: #f0f0f0; border-radius: 4px;">${day}</div>`;
            });
            
            const startDay = startDate.getDay();
            for (let i = 0; i < startDay; i++) html += '<div></div>';
            
            for (let i = 0; i < days; i++) {
                const date = new Date(startDate);
                date.setDate(date.getDate() + i);
                const dateStr = date.toISOString().split('T')[0];
                const dayMeals = currentMeals.filter(m => m.meal_date === dateStr) || [];
                
                html += `
                    <div style="border: 1px solid #ddd; border-radius: 4px; padding: 10px; min-height: 150px; cursor: pointer;" onclick="openMealForm('${dateStr}')">
                        <div style="font-weight: bold; margin-bottom: 10px;">${date.getDate()}</div>
                        ${dayMeals.map(m => `
                            <div style="background: ${m.color || '#4a90e2'}; color: white; padding: 6px; border-radius: 3px; margin-bottom: 5px; font-size: 12px;">
                                <strong>${m.meal_time}</strong><br>${m.family_name || 'Unassigned'}
                            </div>
                        `).join('')}
                        <button style="font-size: 12px; padding: 4px 8px; margin-top: 5px;">+ Add Meal</button>
                    </div>
                `;
            }
            
            html += '</div>';
            document.getElementById('mealCalendar').innerHTML = html;
            await fetchMeals();
        }

        async function fetchMeals() {
            try {
                const res = await fetch(`${API}/api/trips/${currentTripId}/meals`);
                currentMeals = await res.json();
                return currentMeals;
            } catch (e) {
                console.error(e);
                return [];
            }
        }

        function openMealForm(dateStr) {
            const time = prompt('Time (Breakfast, Lunch, Dinner):');
            if (!time) return;
            
            const familyName = prompt('Family name:');
            if (!familyName) return;
            
            const family = families.find(f => f.name === familyName);
            if (!family) {
                alert('Family not found');
                return;
            }
            
            saveMeal(dateStr, time, family.id);
        }

        async function saveMeal(dateStr, time, familyId) {
            try {
                await fetch(`${API}/api/trips/${currentTripId}/meals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        meal_date: dateStr,
                        meal_time: time,
                        meal_name: null,
                        family_id: familyId,
                        description: null
                    })
                });
                generateMealCalendar();
            } catch (e) {
                alert('Error saving meal');
            }
        }
        function loadLogistics() {
    const text = localStorage.getItem(`logistics-${currentTripId}`);
    if (text) {
        document.getElementById('logisticsText').textContent = text;
        document.getElementById('logisticsBanner').style.display = 'block';
        document.getElementById('logisticsInput').value = text;
    } else {
        document.getElementById('logisticsBanner').style.display = 'none';
    }
}

function saveLogistics() {
    const text = document.getElementById('logisticsInput').value.trim();
    if (!text) return alert('Enter logistics notes');
    localStorage.setItem(`logistics-${currentTripId}`, text);
    loadLogistics();
    alert('Logistics saved!');
}
    </script>
</body>
</html>
